<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Movers</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout ───────────────────────────────────────────── */
    .container { max-width: 960px; margin: 0 auto; }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
    }

    /* ── State messages ───────────────────────────────────── */
    #loading, #error, #empty {
      text-align: center;
      padding: 4rem 0;
      font-size: 1rem;
    }

    #loading { color: #718096; }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #2d3748;
      border-top-color: #63b3ed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error {
      color: #fc8181;
      background: #1a0a0a;
      border: 1px solid #742a2a;
      border-radius: 8px;
      padding: 1.5rem 2rem;
    }

    #empty { color: #718096; }

    /* ── Table ────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr { border-bottom: 2px solid #2d3748; }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
    }

    tbody tr {
      border-bottom: 1px solid #1e2530;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #161b26; }

    td {
      padding: 0.9rem 1rem;
      vertical-align: middle;
    }

    /* ── Ticker chip ──────────────────────────────────────── */
    .ticker {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
      background: #1e2530;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
    }

    /* ── % Change (gain / loss) ───────────────────────────── */
    .gain { color: #68d391; font-weight: 600; }
    .loss { color: #fc8181; font-weight: 600; }

    /* ── Significance badge ───────────────────────────────── */
    .badge-unusual {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #2d1b00;
      color: #f6ad55;
      border: 1px solid #744210;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge-normal {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: #1a2035;
      color: #718096;
      border: 1px solid #2d3748;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      white-space: nowrap;
    }

    /* ── Days dropdown ────────────────────────────────────── */
    #days-select {
      background: #1e2530;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      outline: none;
    }

    /* ── Chart ────────────────────────────────────────────── */
    #chart-container {
      background: #161b26;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }

    #chart-container canvas {
      height: 300px !important;
    }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #4a5568;
    }

    /* ── AI Analyst ───────────────────────────────────────── */
    #analyst-section {
      margin-top: 2.5rem;
      background: #161b26;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.5rem;
    }

    #analyst-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }

    .analyst-input-row {
      display: flex;
      gap: 0.75rem;
    }

    #analyst-input {
      flex: 1;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.6rem 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #analyst-input:focus { border-color: #63b3ed; }
    #analyst-input::placeholder { color: #4a5568; }

    #analyst-btn {
      background: #2b6cb0;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.6rem 1.25rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #analyst-btn:hover:not(:disabled) { background: #3182ce; }
    #analyst-btn:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }

    #analyst-answer {
      margin-top: 1rem;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 0.85rem 1rem;
    }

    #analyst-error {
      margin-top: 1rem;
      color: #fc8181;
      font-size: 0.85rem;
    }

    /* ── Analyst markdown rendering ───────────────────────── */
    #analyst-answer p { margin-bottom: 0.75rem; }
    #analyst-answer p:last-child { margin-bottom: 0; }
    #analyst-answer ul, #analyst-answer ol {
      margin: 0.5rem 0 0.75rem 1.25rem;
    }
    #analyst-answer li { margin-bottom: 0.25rem; }
    #analyst-answer a { color: #63b3ed; text-decoration: underline; }
    #analyst-answer a:hover { color: #90cdf4; }
    #analyst-answer strong { color: #e2e8f0; font-weight: 600; }
    #analyst-answer code {
      background: #1e2530;
      border-radius: 3px;
      font-family: monospace;
      font-size: 0.85em;
      padding: 0.1em 0.35em;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>📈 Stock Movers</h1>
    <span class="subtitle">Top daily mover across AAPL · MSFT · GOOGL · AMZN · TSLA · NVDA</span>
    <select id="days-select">
      <option value="7" selected>7 days</option>
      <option value="14">14 days</option>
      <option value="30">30 days</option>
      <option value="60">60 days</option>
      <option value="90">90 days</option>
    </select>
  </header>

  <div id="loading"><span class="spinner"></span> Loading latest data…</div>

  <div id="error" class="hidden"></div>

  <div id="empty" class="hidden">No data yet — check back after market close (5 PM EST).</div>

  <div id="chart-container" class="hidden">
    <canvas id="moversChart"></canvas>
  </div>

  <div id="table-container" class="hidden">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Ticker</th>
            <th>% Change</th>
            <th>Open</th>
            <th>Close</th>
            <th>Percentile</th>
            <th>Significance</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <footer id="footer" class="hidden"></footer>

  <div id="analyst-section">
    <h2>AI Analyst</h2>
    <div class="analyst-input-row">
      <input
        id="analyst-input"
        type="text"
        placeholder="Ask anything about the data…"
        maxlength="500"
      />
      <button id="analyst-btn">Ask</button>
    </div>
    <div id="analyst-answer" class="hidden"></div>
    <div id="analyst-error" class="hidden"></div>
  </div>

</div>

<script>
  // ── Configuration ─────────────────────────────────────────
  // Replace this URL after running `terraform apply` and copying the api_endpoint output.
  const API_URL = "https://y8kadghxxb.execute-api.us-west-1.amazonaws.com/prod/movers";
  // Replace with the analyst_endpoint output from `terraform apply`.
  const ANALYST_ENDPOINT = "https://y8kadghxxb.execute-api.us-west-1.amazonaws.com/prod/analyst";

  // ── DOM refs ─────────────────────────────────────────────
  const $loading    = document.getElementById("loading");
  const $error      = document.getElementById("error");
  const $empty      = document.getElementById("empty");
  const $chart      = document.getElementById("chart-container");
  const $table      = document.getElementById("table-container");
  const $tbody      = document.getElementById("tbody");
  const $footer     = document.getElementById("footer");
  const $daysSelect = document.getElementById("days-select");

  let chartInstance = null;

  function show(el)  { el.classList.remove("hidden"); }
  function hide(el)  { el.classList.add("hidden"); }

  // ── Formatters ───────────────────────────────────────────
  function fmtPct(v)    { return (v >= 0 ? "+" : "") + v.toFixed(2) + "%"; }
  function fmtPrice(v)  { return "$" + v.toFixed(2); }
  function fmtPercentile(v) { return v != null ? v.toFixed(1) + "%" : "—"; }
  function fmtDate(d)   {
    // "2025-07-01" → "Tue, Jul 1"
    const [y, m, day] = d.split("-").map(Number);
    return new Date(y, m - 1, day).toLocaleDateString("en-US", {
      weekday: "short", month: "short", day: "numeric"
    });
  }

  function fmtChartDate(d) {
    // "2025-07-01" → "Jul 1"
    const [y, m, day] = d.split("-").map(Number);
    return new Date(y, m - 1, day).toLocaleDateString("en-US", {
      month: "short", day: "numeric"
    });
  }

  // ── Build chart ──────────────────────────────────────────
  function buildChart(movers) {
    if (chartInstance) {
      chartInstance.destroy();
      chartInstance = null;
    }

    const ctx = document.getElementById("moversChart").getContext("2d");
    const displayed = [...movers].reverse(); // oldest → newest left to right

    chartInstance = new Chart(ctx, {
      type: "bar",
      data: {
        labels: displayed.map(m => fmtChartDate(m.date)),
        datasets: [{
          label: "% Change",
          data: displayed.map(m => m.pct_change),
          backgroundColor: displayed.map(m => m.pct_change >= 0 ? "#22c55e" : "#ef4444"),
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => {
                const mover = displayed[ctx.dataIndex];
                const sign = mover.pct_change >= 0 ? "+" : "";
                const sig = mover.is_significant ? "  ⚠️ Statistically unusual move" : "";
                return `${mover.ticker}: ${sign}${mover.pct_change.toFixed(2)}%${sig}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: { color: "#718096" },
            grid: { color: "#1e2530" },
          },
          y: {
            ticks: {
              color: "#718096",
              callback: (val) => val + "%"
            },
            grid: { color: "#1e2530" },
          }
        }
      }
    });
  }

  // ── Build table row ──────────────────────────────────────
  function buildRow(mover) {
    const isGain = mover.pct_change >= 0;
    const pctClass = isGain ? "gain" : "loss";

    const significanceBadge = mover.is_significant
      ? `<span class="badge-unusual">⚠️ Unusual Move</span>`
      : `<span class="badge-normal">Normal Fluctuation</span>`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${fmtDate(mover.date)}</td>
      <td><span class="ticker">${mover.ticker}</span></td>
      <td class="${pctClass}">${fmtPct(mover.pct_change)}</td>
      <td>${fmtPrice(mover.open_price)}</td>
      <td>${fmtPrice(mover.close_price)}</td>
      <td>${fmtPercentile(mover.percentile_rank)}</td>
      <td>${significanceBadge}</td>
    `;
    return tr;
  }

  // ── Fetch & render ───────────────────────────────────────
  async function loadMovers() {
    const days = $daysSelect.value;
    $tbody.innerHTML = "";
    hide($chart); hide($table); hide($footer); hide($error); hide($empty);
    show($loading);

    try {
      const res = await fetch(`${API_URL}?days=${days}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      hide($loading);

      if (!data.movers || data.movers.length === 0) {
        show($empty);
        return;
      }

      buildChart(data.movers);
      data.movers.forEach(m => $tbody.appendChild(buildRow(m)));

      $footer.textContent =
        `${data.count} record${data.count !== 1 ? "s" : ""} · last updated ${data.generated_at}`;

      show($chart);
      show($table);
      show($footer);

    } catch (err) {
      hide($loading);
      $error.textContent = `Failed to load data: ${err.message}. Please try again later.`;
      show($error);
    }
  }

  document.addEventListener("DOMContentLoaded", loadMovers);
  $daysSelect.addEventListener("change", loadMovers);

  // ── AI Analyst ───────────────────────────────────────────
  const $analystInput  = document.getElementById("analyst-input");
  const $analystBtn    = document.getElementById("analyst-btn");
  const $analystAnswer = document.getElementById("analyst-answer");
  const $analystError  = document.getElementById("analyst-error");

  async function askAnalyst(question) {
    const res = await fetch(ANALYST_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question, context_days: Number($daysSelect.value) }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    return data.answer;
  }

  $analystBtn.addEventListener("click", async () => {
    const question = $analystInput.value.trim();
    if (!question) return;

    hide($analystAnswer);
    hide($analystError);
    $analystBtn.disabled = true;
    $analystBtn.textContent = "Thinking…";

    try {
      const answer = await askAnalyst(question);
      $analystAnswer.innerHTML = marked.parse(answer, { mangle: false, headerIds: false });
      show($analystAnswer);
    } catch (err) {
      $analystError.textContent = `Error: ${err.message}. Please try again.`;
      show($analystError);
    } finally {
      $analystBtn.disabled = false;
      $analystBtn.textContent = "Ask";
    }
  });

  $analystInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") $analystBtn.click();
  });
</script>
</body>
</html>
